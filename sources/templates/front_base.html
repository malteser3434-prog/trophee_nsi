<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Car</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='front_base.css') }}"
    />
  </head>

  <body>
    <div class="mission-hud">
      <p>DATE : 12/02/2026</p>
      <p>HEURE : 17:33</p>
      <p>LIEU : Lyon - Base militaire</p>
    </div>
    <div class="conteneur-enigme">
      <h2 class="feedback">Système de Sécurité de la Barrière</h2>

      <button onclick="checkAcces()" class="fence">
        Actionner la barrière
      </button>

      <p id="affichage-resultat"></p>
      <button class="notebook-btn">
        <img
          src="{{ url_for('static', filename='pics/mini-clipboard.png') }}"
          style="width: 50px"
        />
      </button>

      <div class="notebook" style="display: none">
        <div class="close-btn">✖</div>
        <textarea
          class="notebook-text"
          placeholder="Écris ici tes pistes..."
        ></textarea>
      </div>

      <script src="{{ url_for('static', filename='scripts.js') }}"></script>
    </div>
  </body>
</html>
