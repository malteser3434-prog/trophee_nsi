<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Archive 01</title>
  <style>
    body {
      margin: 0;
      font-family: monospace;
      background: #0b0b0b;
      color: #e0e0e0;
      display: flex;
    }

    #main {
      flex: 1;
      padding: 40px;
    }

    #pins {
      width: 300px;
      background: #111;
      border-left: 1px solid #00ff15;
      padding: 10px;
      overflow-y: auto;
    }

    .pin {
      border: 1px solid #00d9ff;
      margin-bottom: 10px;
      padding: 5px;
      font-size: 12px;
      background: #000;
    }

    /* Bouton carnet */
    #notebook-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ff0066;
      color: black;
      border: none;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 6px;
    }

    /* Carnet */
    #notebook {
      position: fixed;
      bottom: 70px;
      right: 20px;
      width: 300px;
      height: 300px;
      background: #111;
      border: 1px solid #ffffff;
      display: none;
      flex-direction: column;
    }

    #notebook h3 {
      margin: 0;
      padding: 8px;
      background: #ea00ff;
      color: black;
      font-size: 14px;
    }

    #notebook textarea {
      flex: 1;
      background: black;
      color: #bb00ff;
      border: none;
      resize: none;
      padding: 10px;
      font-family: monospace;
      outline: none;
    }
  </style>
</head>

<body>

  <div id="main">
    <h1>ARCHIVE CONFIDENTIELLE</h1>
    <p>Le fichier contient des informations incomplètes.</p>
    <p>Observe bien ce qui t’est donné.</p>
    <a href="/download">Télécharger le document</a>
  </div>

  <div id="pins">
    <h3>📌 Indices épinglés</h3>
  </div>

  <!-- Bouton carnet -->
  <button id="notebook-btn">📓 Carnet</button>

  <!-- Carnet -->
  <div id="notebook">
    <h3>Carnet d'enquête</h3>
    <textarea id="notebook-text" placeholder="Écris ici tes hypothèses, codes, pistes..."></textarea>
  </div>

  <script>
    const btn = document.getElementById("notebook-btn");
    const notebook = document.getElementById("notebook");
    const textarea = document.getElementById("notebook-text");

    // Ouvrir / fermer le carnet
    btn.addEventListener("click", () => {
      notebook.style.display = notebook.style.display === "flex" ? "none" : "flex";
    });

    // Sauvegarde auto dans le navigateur
    textarea.value = localStorage.getItem("notebook") || "";

    textarea.addEventListener("input", () => {
      localStorage.setItem("notebook", textarea.value);
    });
  </script>

</body>

</html>
